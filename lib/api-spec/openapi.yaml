  /manufacturing/assemble:
    post:
      operationId: assembleItem
      tags: [manufacturing]
      summary: Atomically assemble a finished product from a BOM
      description: >
        Runs a BOM recipe in a single SERIALIZABLE transaction: creates a
        completed workload card, debits all required raw materials, credits the
        finished product stock, and writes stock movements. All-or-nothing —
        if any step fails (e.g. insufficient raw material) nothing is committed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssembleItemInput"
      responses:
        "201":
          description: Assembly committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadCard"
        "400":
          description: Invalid request (bad BOM, non-positive batches, etc.)
        "409":
          description: Insufficient raw material to assemble
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  shortages:
                    type: array
                    items:
                      type: object
                      properties:
                        materialProductId: { type: integer }
                        materialProductName: { type: string }
                        required: { type: number }
                        available: { type: number }
                        unit: { type: string }

  /workload/{id}:
    patch:
      operationId: updateWorkloadCard
      tags: [manufacturing]
      summary: Update workload card status/assignment
