        placeOfSupply:
          type: string
        salesmanId:
          type: ["integer", "null"]
        poNumber:
          type: ["string", "null"]
        eWayBillNo:
          type: ["string", "null"]
        freight:
          type: number
        roundOff:
          type: number
        items:
          type: array
          description: When present, fully replaces line items and triggers stock/ledger reversal+reapply.
          items:
            $ref: "#/components/schemas/InvoiceItemInput"

