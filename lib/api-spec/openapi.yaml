openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Shradha Oil Center ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: entities
  - name: invoices
  - name: payments
  - name: rewards
  - name: manufacturing
  - name: dashboard
  - name: reports
  - name: subscriptions
  - name: settings
  - name: system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # SYSTEM
  /system/config:
    get:
      operationId: getSystemConfig
      tags: [system]
      summary: Get deployment/system config (public)
      responses:
        "200":
          description: System config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"

  /system/companies:
    get:
      operationId: getCompanies
      tags: [system]
      summary: List all tenant companies (super_admin only)
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyOption"
        "403":
          description: Super admin access required

  /system/companies-public:
    get:
      operationId: getPublicCompanies
      tags: [system]
      summary: List tenant companies for the login screen company switcher (public)
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyOption"

  /system/active-company:
    post:
      operationId: setActiveCompany
      tags: [system]
      summary: Switch the super_admin into a company (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetActiveCompanyInput"
      responses:
        "200":
          description: Active company set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveCompany"
        "403":
          description: Super admin access required
        "404":
          description: Company not found

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Not authenticated

  /auth/permissions:
    get:
      operationId: getRolePermissions
      tags: [auth]
      summary: Get role permissions matrix
      responses:
        "200":
          description: Permissions matrix
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RolePermission"

    put:
      operationId: updateRolePermissions
      tags: [auth]
      summary: Update role permissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolePermissionsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RolePermission"

  # SETTINGS (admin only)
  /settings:
    get:
      operationId: getAppSettings
      tags: [settings]
      summary: Get application settings (default invoice template, etc.)
      responses:
        "200":
          description: App settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateAppSettings
      tags: [settings]
      summary: Update application settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
        "403":
          description: Admin access required

  /print-settings:
    get:
      operationId: getPrintSettings
      tags: [settings]
      summary: Get per-company invoice print settings (merged with defaults)
      responses:
        "200":
          description: Print settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintSettings"
    put:
      operationId: updatePrintSettings
      tags: [settings]
      summary: Update per-company invoice print settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrintSettingsUpdate"
      responses:
        "200":
          description: Updated print settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintSettings"
        "403":
          description: Admin access required

  /number-series:
    get:
      operationId: listNumberSeries
      tags: [settings]
      summary: List document number series configs (invoice / order / quotation)
      responses:
        "200":
          description: Number series list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NumberSeries"

  /number-series/{seriesType}:
    put:
      operationId: updateNumberSeries
      tags: [settings]
      summary: Update a document number series config (admin only)
      parameters:
        - name: seriesType
          in: path
          required: true
          schema:
            type: string
            enum: [invoice, order, quotation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NumberSeriesUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumberSeries"
        "403":
          description: Admin access required

  /system/backup-settings:
    get:
      operationId: getBackupSettings
      tags: [system]
      summary: Get automatic-backup cadence preferences (admin only)
      responses:
        "200":
          description: Backup settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSettings"
        "403":
          description: Admin access required
    put:
      operationId: updateBackupSettings
      tags: [system]
      summary: Update automatic-backup cadence preferences (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupSettingsUpdate"
      responses:
        "200":
          description: Updated backup settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSettings"
        "403":
          description: Admin access required

  /system/backups:
    get:
      operationId: listBackups
      tags: [system]
      summary: List backup history (admin only)
      responses:
        "200":
          description: Backup history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackupHistoryItem"
        "403":
          description: Admin access required

  /system/restore:
    post:
      operationId: restoreBackup
      tags: [system]
      summary: Restore company data from an uploaded backup package (admin only, destructive)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreBackupInput"
      responses:
        "200":
          description: Restore completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResult"
        "400":
          description: Invalid or mismatched backup package
        "403":
          description: Admin access required

  /system/reset:
    post:
      operationId: resetCompanyData
      tags: [system]
      summary: Wipe all company business data to start fresh (admin only, destructive)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetDataInput"
      responses:
        "200":
          description: Reset completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
        "400":
          description: Confirmation token missing or incorrect
        "403":
          description: Admin access required

  /gstin-lookup:
    get:
      operationId: lookupGstin
      tags: [settings]
      summary: Fetch business details for a GSTIN (optional external provider)
      parameters:
        - name: gstin
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstinLookupResult"

  # USER ACCOUNTS (admin only)
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all user accounts (admin only)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserAccount"
        "403":
          description: Admin access required
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccount"
        "409":
          description: Username already taken

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user account — rename, change role, reset password, toggle active, or relink entity (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccount"

  # PRODUCTS / INVENTORY
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: group
          in: query
          schema:
            type: string
        - name: brand
          in: query
          schema:
            type: string
        - name: forSale
          in: query
          schema:
            type: boolean
        - name: forManufacturing
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/stock-movements:
    get:
      operationId: getProductStockMovements
      tags: [products]
      summary: Get stock movement history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

    post:
      operationId: createStockMovement
      tags: [products]
      summary: Create stock movement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  /products/groups:
    get:
      operationId: listProductGroups
      tags: [products]
      summary: List product groups
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /products/brands:
    get:
      operationId: listBrands
      tags: [products]
      summary: List brands
      responses:
        "200":
          description: Brands
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ENTITIES (customers, vendors, workers, salesmen)
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List entities
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [customer, vendor, worker, salesman]
        - name: search
          in: query
          schema:
            type: string
        - name: mobile
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entity"

    post:
      operationId: createEntity
      tags: [entities]
      summary: Create entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/lookup:
    get:
      operationId: lookupEntityByMobile
      tags: [entities]
      summary: Lookup entity by mobile
      parameters:
        - name: mobile
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityLookup"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

    patch:
      operationId: updateEntity
      tags: [entities]
      summary: Update entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}/ledger:
    get:
      operationId: getEntityLedger
      tags: [entities]
      summary: Get customer ledger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityLedger"
    post:
      operationId: createLedgerAdjustment
      tags: [entities]
      summary: Add a manual credit/debit adjustment to a customer ledger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerAdjustmentInput"
      responses:
        "201":
          description: Created ledger entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  # INVOICES
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
        - name: salesmanId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [gst, non_gst]
        - name: month
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          description: Inclusive start date (YYYY-MM-DD) for invoice date filter
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: dateTo
          in: query
          description: Inclusive end date (YYYY-MM-DD) for invoice date filter
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, saved, cancelled]
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PAYMENTS
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

    post:
      operationId: logPayment
      tags: [payments]
      summary: Log a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/approve:
    post:
      operationId: approvePayment
      tags: [payments]
      summary: Approve payment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/reject:
    post:
      operationId: rejectPayment
      tags: [payments]
      summary: Reject payment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ACCOUNTS (Cash / UPI / Bank)
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete (deactivate) an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # CASH BOOK — salesman cash collection
  /cashbook:
    get:
      operationId: getCashbook
      tags: [accounts]
      summary: Get cash book summary (per-salesman pending cash + account balances)
      responses:
        "200":
          description: Cashbook summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashbookSummary"

  /account-transactions:
    get:
      operationId: listAccountTransactions
      tags: [accounts]
      summary: List account transactions (cash in/out)
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
        - name: direction
          in: query
          schema:
            type: string
            enum: [in, out]
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountTransaction"
    post:
      operationId: createAccountTransaction
      tags: [accounts]
      summary: Record a Payment In or Payment Out against an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountTransactionInput"
      responses:
        "201":
          description: Created
          content:
