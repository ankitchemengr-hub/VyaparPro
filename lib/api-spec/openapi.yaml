        password:
          type: string
        companyId:
          type: ["integer", "null"]
          description: >-
            Optional company selected via the login screen's hidden "Switch
            Company" feature. Lets a user sign into a company other than this
            deployment's locked default, but only into the company their own
            account belongs to.

    AuthSession:
      type: object
      required: [id, username, role, name]
