      required: [inventoryValue, receivable, cashInAccounts, payable, expenses, capital, capitalK, snapshotDate]
      properties:
        snapshotDate:
          type: string
        inventoryValue:
          type: number
        receivable:
          type: number
        cashInAccounts:
          type: number
        payable:
          type: number
        expenses:
          type: number
        capital:
          type: number
          description: Raw capital value (inventory + receivable + cash - payable - expenses)
        capitalK:
          type: number
          description: Capital divided by 1000 (the value to display)
        previousCapital:
          type: ["number", "null"]
        previousCapitalK:
          type: ["number", "null"]
        previousDate:
          type: ["string", "null"]
        growth:
          type: ["number", "null"]
          description: today capital - yesterday capital (raw rupees)
        growthK:
          type: ["number", "null"]
          description: today capitalK - yesterday capitalK (the value to display)

    SalesTrendPoint:
      type: object
      required: [date, totalSales, invoiceCount]
      properties:
        date:
          type: string
          description: ISO date (YYYY-MM-DD) for this trend point
        day:
          type: integer
        month:
          type: integer
        year:
          type: integer
        totalSales:
          type: number
        invoiceCount:
          type: integer

